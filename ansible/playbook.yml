---
- name: Configure server with Docker
  hosts: webservers
  become: yes

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose
      apt:
        name: docker-compose
        state: present

    - name: Add user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
